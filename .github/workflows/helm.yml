name: Helm Chart Release

on:
  repository_dispatch:
    types: [helm_chart_release]

jobs:
  helm:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v2
      with:
        ref: main

    - name: Update Chart Version
      run: |
        sed -i "s/^version: .*/version: ${{ github.event.client_payload.next_version }}/" helm-charts/recycler/Chart.yaml
        sed -i "s/^appVersion: .*/appVersion: \"${{ github.event.client_payload.next_version }}\"/" helm-charts/recycler/Chart.yaml

    - name: Update Helm chart image tag
      run: |
        sed -i "s/tag: .*/tag: ${{ github.event.client_payload.next_version }}/" helm-charts/recycler/values.yaml

    - name: Package Helm Chart
      run: |
        mkdir -p ./releases
        helm package ./helm-charts/recycler --destination ./releases
        helm repo index ./releases --url https://${{ github.repository_owner }}.github.io/recycler/releases

    - name: Commit and Push Helm Chart Updates
      if: success()
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git add helm-charts/recycler/Chart.yaml helm-charts/recycler/values.yaml ./releases
        git commit -m "Update Helm chart to version ${{ github.event.client_payload.next_version }} [skip ci]"
        git push origin main
      env:
        GITHUB_TOKEN: ${{ github.token }}

    - name: Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.event.client_payload.next_version }}
        files: ./releases/recycler-${{ github.event.client_payload.next_version }}.tgz

    - name: Upload Helm Chart to Release
      uses: softprops/action-gh-release@v2
      id: release
      with:
        tag_name: ${{ github.event.client_payload.next_version }}
        files: |
          releases/recycler-${{ github.event.client_payload.next_version }}.tgz
  pages:
    needs: [helm]
    runs-on: ubuntu-latest
    permissions:
      pages: write      # to deploy to Pages
      id-token: write   # to verify the deployment originates from an appropriate source
    steps:
    - name: Checkout code
      uses: actions/checkout@v2
      with:
        ref: main

    - name: Setup Pages
      uses: actions/configure-pages@v5

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: '.'

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
