name: Helm Chart Release

on:
  repository_dispatch:
    types: [helm_chart_release]

jobs:
  helm:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: write
      attestations: write
      id-token: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v2
      with:
        ref: main

    - name: Update Chart Version
      run: |
        sed -i "s/^version: .*/version: ${{ github.event.client_payload.next_version }}/" helm-charts/recycler/Chart.yaml
        sed -i "s/^appVersion: .*/appVersion: \"${{ github.event.client_payload.next_version }}\"/" helm-charts/recycler/Chart.yaml

    - name: Update Helm chart image tag
      run: |
        sed -i "s/tag: .*/tag: ${{ github.event.client_payload.next_version }}/" helm-charts/recycler/values.yaml

    - name: Package Helm Chart
      run: |
        mkdir -p ./releases
        helm package ./helm-charts/recycler --destination ./releases

    - name: Authenticate with GHCR
      run: |
        echo "${{ github.token }}" | helm registry login ghcr.io --username ${{ github.actor }} --password-stdin

    - name: Push Helm Chart to GitHub Container Registry
      run: |
        CHART_FILE=releases/recycler-${{ github.event.client_payload.next_version }}.tgz
        echo "Pushing $CHART_FILE to GHCR..."
        helm push $CHART_FILE oci://ghcr.io/${{ github.repository_owner }}/charts

    - name: Authenticate with Docker Hub
      run: |
        echo "${{ secrets.DOCKERHUB_TOKEN }}" | helm registry login registry-1.docker.io --username ${{ vars.DOCKERHUB_USERNAME }} --password-stdin

    - name: Push Helm Chart to GitHub Container Registry
      run: |
        CHART_FILE=releases/recycler-${{ github.event.client_payload.next_version }}.tgz
        echo "Pushing $CHART_FILE to Docker hub..."
        helm push $CHART_FILE oci://registry-1.docker.io/theonlywaye

    - name: Update Release with Helm Chart Packages
      uses: softprops/action-gh-release@v2
      id: release
      with:
          name: ${{ github.event.client_payload.next_version }}
          body: |
            Helm Chart Paths:
            - GHCR: oci://ghcr.io/${{ github.repository_owner }}/charts/recycler-${{ github.event.client_payload.next_version }}.tgz
            - Docker Hub: oci://registry-1.docker.io/theonlywaye/recycler-${{ github.event.client_payload.next_version }}.tgz
          tag_name: ${{ github.event.client_payload.next_version }}
          append_body: true

  pages:
    needs: [helm]
    runs-on: ubuntu-latest
    permissions:
      pages: write      # to deploy to Pages
      id-token: write   # to verify the deployment originates from an appropriate source
    steps:
    - name: Checkout code
      uses: actions/checkout@v2
      with:
        ref: main

    - name: Setup Pages
      uses: actions/configure-pages@v5

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: '.'

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
