name: Build and Push Recycler Operator image

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
    branches:
        - main
  release:
    types: [published]

jobs:
  semver:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      current_version: ${{ steps.semver.outputs.current }}
      next_version: ${{ steps.semver.outputs.nextStrict }}
      release_upload_url: ${{ steps.release.outputs.upload_url }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Get Next Version
      id: semver
      uses: ietf-tools/semver-action@v1
      with:
        token: ${{ github.token }}
        branch: ${{ github.head_ref || github.ref_name }}
        patchAll: true
        majorList: "breaking,major"

  build:
    needs: [semver]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v2

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: 'go.mod'

    - name: Install Operator SDK
      run: make operator-sdk

    - name: Update Chart Version
      run: |
        sed -i "s/^version: .*/version: ${{ needs.semver.outputs.next_version }}/" helm-charts/recycler/Chart.yaml
        sed -i "s/^appVersion: .*/appVersion: \"${{ needs.semver.outputs.next_version }}\"/" helm-charts/recycler/Chart.yaml

    - name: Install Helmify
      run: make helmify

    - name: Generate Helm Charts
      run: make helm

    - name: Update Helm Chart Tag
      run: |
        sed -i "s/tag: .*/tag: ${{ needs.semver.outputs.next_version }}/" helm-charts/recycler/values.yaml

    - name: Package Helm Chart
      run: |
        mkdir -p ./releases
        helm package ./helm-charts/recycler --destination ./releases
        helm repo index ./releases --url https://${{ github.repository_owner }}.github.io/${{ github.repository }}/releases

    - name: Commit and Push Helm Chart Updates
      if: success()
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git add helm-charts/recycler/Chart.yaml helm-charts/recycler/values.yaml ./releases
        git commit -m "Update Helm chart to version ${{ needs.semver.outputs.next_version }} [skip ci]"
        git push origin main
      env:
        GITHUB_TOKEN: ${{ github.token }}

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ vars.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build Operator
      run: make docker-buildx IMG=theonlywaye/recycler:${{ needs.semver.outputs.next_version }} VERSION=${{ needs.semver.outputs.next_version }}
      #run: make docker-build docker-push IMG=theonlywaye/recycler:${{ needs.semver.outputs.next_version }} VERSION=${{ needs.semver.outputs.next_version }}

  release:
    needs: [semver, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout code
      uses: actions/checkout@v2
      with:
        ref: main

    - name: Update CHANGELOG
      id: changelog
      uses: requarks/changelog-action@v1
      with:
        token: ${{ github.token }}
        tag: ${{ needs.semver.outputs.current_version }}

    - name: Checkout code
      uses: actions/checkout@v2
      with:
        ref: main

    - name: Commit CHANGELOG.md
      uses: stefanzweifel/git-auto-commit-action@v4
      with:
        branch: main
        commit_message: 'docs: update CHANGELOG.md for ${{ github.ref_name }} [skip ci]'
        file_pattern: CHANGELOG.md

    - name: Create Release
      uses: ncipollo/release-action@v1
      id: release
      with:
        allowUpdates: true
        draft: false
        makeLatest: true
        name: ${{ needs.semver.outputs.next_version }}
        tag: ${{ needs.semver.outputs.next_version }}
        body: ${{ steps.changelog.outputs.changes }}
        token: ${{ github.token }}
        artifactContentType: application/gzip
        artifacts: ./releases/recycler-${{ needs.semver.outputs.next_version }}.tgz

  cleanup:
    needs: [semver, build, release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    if: failure()

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - uses: ClementTsang/delete-tag-and-release@v0.3.1
        with:
          delete_release: true # default: false
          tag_name: v${{ needs.semver.outputs.next_version }} # tag name to delete
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Reset Branch to Initial Commit
        run: |
          git fetch origin
          git reset --hard ${{ github.sha }}
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git push --force origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
