name: Manifests

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-manifests:
    name: Verify manifests are up to date
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod

      - name: Check controller-gen version annotation
        run: |
          make check-controller-gen-version

      - name: Generate manifests
        run: |
          make manifests

      - name: Check for changes
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            echo "Manifests are out of date. The following files have changes:"
            git status --porcelain
            git diff
            echo "Run 'make manifests' locally and commit the results."
            exit 1
          fi
          echo "Manifests are up to date."
