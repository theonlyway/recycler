name: Manifests

on:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-manifests:
    name: Verify manifests are up to date
    runs-on: ubuntu-latest
    steps:
      - name: Clone the code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod

      - name: Check controller-gen version annotation
        run: |
          make check-controller-gen-version

      - name: Generate manifests
        run: |
          make manifests

      - name: Generate helm charts
        run: |
          make helm

      - name: Check for changes
        run: |
          if [[ -n $(git status --porcelain) ]]; then
            echo "Manifests or helm charts are out of date. The following files have changes:"
            git status --porcelain
            git diff
            echo "Run 'make manifests && make helm' locally and commit the results."
            exit 1
          fi
          echo "Manifests and helm charts are up to date."
